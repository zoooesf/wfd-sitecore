query GetAlertBanner(
  $datasource: String!
  $language: String!
  $fieldName: String = "siteWideAlertBanner"
) {
  item(path: $datasource, language: $language) {
    ... on AlertBannerFolder {
      alertBanner: field(name: $fieldName) {
        ... on LookupField {
          targetItem {
            id
            ... on AlertBanner {
              ...HeadingFieldFragment
              ...BodyFieldFragment
              alertCategory {
                value
              }
            }
          }
        }
      }
    }
  }
}
