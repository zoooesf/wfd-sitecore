    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: How Deep Linking Enhances Navigation
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Deep linking allows systems like your main navigation or a departmental landing page to contain links that are pre-filtered. For example, the "Events" page in your navigation doesn't need to rebuild a search list; it simply links to #f-m_content_type=Event. This ensures consistent filtering logic across the entire website and reduces maintenance overhead.</p></div>
