    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <h2>Overview</h2>
        <p>This intensive five-day certification bootcamp prepares project management professionals for advanced certification while providing practical skills that can be immediately applied in the workplace. Through a combination of instruction, case studies, and hands-on exercises, participants will master advanced project management methodologies, stakeholder engagement techniques, and business analysis fundamentals.</p>
        <h2>What to Expect: Your 5-Day Intensive PM Bootcamp</h2>
        <ul>
            <li>Hands-on, Practical Skill Mastery: Move beyond theory with a Project Planning Workshop, real-world Case Study Analysis, and collaborative Group Projects focused on immediately applicable skills in risk, stakeholder, and business analysis.</li>
            <li>Expert-Led Advanced Content: Master cutting-edge methodologies, including Agile and Hybrid Frameworks, delivered by featured industry leaders like James Patterson and Samantha Brooks.</li>
            <li>Direct Path to Certification: Benefit from structured Exam Preparation and a Final Review Session, culminating in the Certification Exam on Day 5, followed by a certificate ceremony.</li>
            <li>Networking &amp; Leadership Insights: Engage in study group formation and participate in a Project Leadership Panel with experts Gregory Walsh and Jonathan Lee to gain career-shaping advice.</li>
        </ul>
        <h2>Agenda</h2>
        <p><strong>Day 1 - June 16</strong></p>
        <ul>
            <li>9:00am - Program Opening &amp; Introductions</li>
            <li>9:30am - Advanced Project Management Framework by James Patterson</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Project Planning Workshop</li>
            <li>4:00pm - Study Group Formation</li>
            <li>5:00pm - Day 1 Close</li>
        </ul>
        <p><strong>Day 2 - June 17</strong></p>
        <ul>
            <li>9:00am - Risk Management and Mitigation</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Stakeholder Management Techniques</li>
            <li>4:00pm - Practice Exercises</li>
            <li>5:00pm - Day 2 Close</li>
        </ul>
        <p><strong>Day 3 - June 18</strong></p>
        <ul>
            <li>9:00am - Business Analysis Integration by Samantha Brooks</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Case Study Analysis</li>
            <li>4:00pm - Group Projects</li>
            <li>5:00pm - Day 3 Close</li>
        </ul>
        <p><strong>Day 4 - June 19</strong></p>
        <ul>
            <li>9:00am - Agile and Hybrid Methodologies</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Project Leadership Panel with Gregory Walsh and Jonathan Lee</li>
            <li>4:00pm - Exam Preparation</li>
            <li>5:00pm - Day 4 Close</li>
        </ul>
        <p><strong>Day 5 - June 20</strong></p>
        <ul>
            <li>9:00am - Final Review Session</li>
            <li>11:00am - Certification Exam</li>
            <li>2:00pm - Exam Conclusion &amp; Certificate Ceremony</li>
        </ul>
        <h2>A Must-Attend Event For</h2>
        <p>Project management professionals seeking <strong>advanced certification</strong> and practical, immediately applicable skills in a five-day intensive format.</p>
        <h2>Location Details</h2>
        <p><strong>Atlanta Professional Training Center</strong></p>
        <p>3350 Peachtree Rd NE<br />
        Atlanta, GA <br />
        30326</p>
