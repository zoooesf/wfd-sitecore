        <div class="ck-content"><p>The Event Search Listing includes flexible date filtering that can be applied through the interface or via query strings. Users can search for events happening today, this week, this month, or custom date ranges. Deep links can pre-set these parameters, so promotional emails for "This Month's Events" automatically display the correct timeframe when recipients click through.</p></div>
