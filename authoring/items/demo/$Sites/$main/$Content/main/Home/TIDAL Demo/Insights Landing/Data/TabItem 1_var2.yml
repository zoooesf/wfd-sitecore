    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: Filtering & Refinement
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>After executing a search, powerful filtering tools appear in a sidebar panel. You can refine results by publication date ranges, specific authors, topics and tags, content types, industries, and geographic regions. Filters can be combined to create highly specific result sets. For example, you might filter for "white papers published in the last 6 months about renewable energy in Europe." Active filters display as removable chips above the results, and you can save filter combinations for future use. The system remembers your most-used filters to streamline recurring research tasks.</p></div>
