      Hint: heading
      Value: "Can I use both access methods simultaneously?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Yes. You can layer user authentication and attestation requirements for maximum security. Users will first authenticate their identity, then provide attestation acknowledgment before accessing content. This is ideal for highly sensitive materials requiring both identity verification and legal acknowledgment.</p></div>
