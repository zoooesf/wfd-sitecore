      Value: Attestation Requirements
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p><strong>Documented Consent and Acknowledgment</strong><br />Attestation Locked Down requires users to explicitly agree to terms, policies, or acknowledgments before accessing content. This creates an auditable record of user consent and ensures compliance with legal and regulatory requirements.</p><p><strong>Key Capabilities:</strong></p><ul><li>Fully customizable attestation text and terms</li><li>Time-stamped consent records for compliance auditing</li><li>Version control for updated terms and conditions</li><li>Required re-attestation when terms change</li></ul><p><strong>Ideal Use Cases:</strong><br />Legal documents, compliance training materials, regulated content, terms of service agreements, confidentiality requirements, and any content requiring documented user acknowledgment.</p></div>
