    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "What types of content should use attestation?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Attestation Lockdown is ideal for any content requiring documented user acknowledgment: legal documents and contracts, compliance training materials, confidential business information, regulatory disclosures, terms of service or usage policies, privacy policies, intellectual property with usage restrictions, sensitive financial data, healthcare information requiring HIPAA acknowledgment, and any content where you need proof that users understood and agreed to specific conditions before access.</p></div>
