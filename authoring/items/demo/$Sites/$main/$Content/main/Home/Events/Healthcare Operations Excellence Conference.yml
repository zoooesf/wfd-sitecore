        <h2>Overview</h2>
        <p>The annual Healthcare Operations Excellence Conference brings together hospital administrators, clinical leaders, and healthcare operations professionals to explore strategies for improving operational efficiency while maintaining the highest standards of patient care. This three-day event covers process optimization, quality assurance, regulatory compliance, and the integration of healthcare technology to drive better outcomes.</p>
        <h2>What to Expect</h2>
        <p>A three-day annual conference featuring an opening keynote by <strong>Sarah Mitchell</strong>, a workshop on <strong>Lean Healthcare Methodologies</strong>, a presentation on <strong>Healthcare Technology Integration</strong> by <strong>David Kowalski</strong>, and an update on <strong>Compliance and Regulatory</strong> issues by <strong>Patricia Johnson</strong>.</p>
        <h2>Key Topics</h2>
        <ul>
            <li>The Future of <strong>Healthcare Operations</strong></li>
            <li>Improving <strong>Operational Efficiency</strong> and <strong>Process Optimization</strong></li>
            <li><strong>Lean Healthcare Methodologies</strong></li>
            <li><strong>Quality Assurance</strong></li>
            <li><strong>Compliance and Regulatory Update</strong></li>
            <li><strong>Healthcare Technology Integration</strong></li>
            <li><strong>Patient Experience</strong> and Operational Excellence</li>
        </ul>
        <h2>Agenda</h2>
        <p><strong>Day 1 - May 5</strong></p>
        <ul>
            <li>8:30am - Registration &amp; Breakfast</li>
            <li>9:30am - Opening Keynote: "The Future of Healthcare Operations" by Sarah Mitchell</li>
            <li>11:00am - Clinical Operations Track Sessions</li>
            <li>12:30pm - Networking Lunch</li>
            <li>2:00pm - Workshop: Lean Healthcare Methodologies</li>
            <li>4:00pm - Quality Assurance Panel</li>
            <li>5:30pm - Welcome Reception</li>
        </ul>
        <p><strong>Day 2 - May 6</strong></p>
        <ul>
            <li>8:30am - Breakfast</li>
            <li>9:30am - Healthcare Technology Integration by David Kowalski</li>
            <li>11:00am - Compliance and Regulatory Update by Patricia Johnson</li>
            <li>12:30pm - Lunch</li>
            <li>2:00pm - Case Studies: Operational Transformation Success Stories</li>
            <li>4:00pm - Interactive Workshops</li>
            <li>5:30pm - Networking Event</li>
        </ul>
        <p><strong>Day 3 - May 7</strong></p>
        <ul>
            <li>8:30am - Breakfast</li>
            <li>9:30am - Patient Experience and Operational Excellence</li>
            <li>11:00am - Closing Keynote: "Leading Change in Healthcare" by Maria Gonzalez</li>
            <li>12:30pm - Conference Closing</li>
        </ul>
        <h2>Who Should Attend</h2>
        <ul>
            <li>Hospital Administrators</li>
            <li>Clinical Leaders</li>
            <li>Healthcare Operations Professionals</li>
            <li>Individuals focused on Healthcare, Operations, Quality Assurance, and Compliance Solutions</li>
        </ul>
        <h2>Location Details</h2>
        <p><strong>Phoenix Medical Center Convention Wing</strong></p>
        <p>1234 N Central Ave<br />
        Phoenix, AZ <br />
        85004</p>
