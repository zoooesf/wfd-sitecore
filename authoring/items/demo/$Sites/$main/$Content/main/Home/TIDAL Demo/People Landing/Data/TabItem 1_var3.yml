    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: Data Integrity
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>The feature is built upon a single source of truth for employee data (e.g., HRIS), ensuring contact and status information is always accurate. A flexible metadata layer is applied on top of this core data, allowing administrators to define the specialized skills, certifications, and functional groupings necessary for the feature variants (like "Academic Partnerships" or "Automation"). This separation of core data from functional metadata provides integrity and flexibility for organizational change.</p></div>
