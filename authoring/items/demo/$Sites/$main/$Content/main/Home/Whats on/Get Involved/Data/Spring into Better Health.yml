        <div class="ck-content"><p><span style="background-color:rgb(255,255,255);color:rgb(34,35,40);"><span style="-webkit-text-stroke-width:0px;display:inline !important;float:none;font-family:Montserrat, &quot;Helvetica Neue&quot;, Arial, sans-serif;font-size:16px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">As the days get warmer and the sun sets later, go outside to energize your mind and body. Research has shown spending 120 minutes a week in nature improves health and well-being. Making healthy eating choices can give you a boost in mood and happiness, too.</span></span></p></div>
