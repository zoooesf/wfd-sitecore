    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "How does Login Account Locked Down work?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>When you enable Login Account Locked Down on content, the system intercepts all access attempts and verifies user authentication status. Unauthenticated visitors are immediately redirected to your login page. After successful authentication, users are automatically returned to their intended content. The system maintains their session across your protected resources, so they only need to log in once per session.</p></div>
