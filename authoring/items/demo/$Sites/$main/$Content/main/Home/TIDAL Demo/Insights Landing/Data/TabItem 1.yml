      Hint: heading
      Value: Search Functionality
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>The core search experience begins with a prominent search bar that accepts natural language queries. As you type, our autocomplete system suggests relevant terms, popular searches, and related topics. The search algorithm examines document titles, abstracts, full text, metadata tags, and author profiles to determine relevance. Results appear instantly, with highlighted snippets showing where your search terms appear in context. Each result displays the content type, publication date, author, estimated reading time, and a brief excerpt to help you quickly assess relevance.</p></div>
