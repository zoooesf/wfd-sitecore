        <h2>Overview</h2>
        <p>The Aerospace Manufacturing Excellence Summit brings together aerospace manufacturers, suppliers, and engineers to explore advanced manufacturing techniques, quality systems, and operational excellence strategies specific to the aerospace industry. This three-day summit features technical presentations, facility tours, and collaborative sessions focused on meeting the stringent requirements of aerospace production.</p>
        <h2>Key Topics</h2>
        <ul>
            <li><strong>Aerospace Manufacturing</strong> in the Modern Era</li>
            <li><strong>Quality Standards</strong> and Certification Requirements</li>
            <li>Technical Session: <strong>Advanced Composites Manufacturing</strong></li>
            <li>Workshop: <strong>Lean Aerospace Operations</strong></li>
            <li><strong>Engineering Excellence</strong> in Aerospace</li>
            <li><strong>Supply Chain Management</strong> for Aerospace</li>
            <li><strong>Innovation</strong> in Aerospace Manufacturing</li>
        </ul>
        <h2>Agenda</h2>
        <p><strong>Day 1 - April 14</strong></p>
        <ul>
            <li>8:00am - Registration &amp; Breakfast</li>
            <li>9:00am - Opening Keynote: "Aerospace Manufacturing in the Modern Era" by Emily Rodriguez</li>
            <li>10:30am - Quality Standards and Certification Requirements</li>
            <li>12:00pm - Lunch</li>
            <li>1:30pm - Technical Session: Advanced Composites Manufacturing</li>
            <li>3:30pm - Workshop: Lean Aerospace Operations by Thomas Anderson</li>
            <li>5:00pm - Welcome Reception</li>
        </ul>
        <p><strong>Day 2 - April 15</strong></p>
        <ul>
            <li>8:00am - Breakfast</li>
            <li>9:00am - Engineering Excellence in Aerospace by David Kowalski</li>
            <li>10:30am - Supply Chain Management for Aerospace</li>
            <li>12:00pm - Lunch</li>
            <li>1:30pm - Facility Tour: Boeing Production System (Transportation Provided)</li>
            <li>4:00pm - Networking Event</li>
            <li>5:00pm - Day 2 Close</li>
        </ul>
        <p><strong>Day 3 - April 16</strong></p>
        <ul>
            <li>8:00am - Breakfast</li>
            <li>9:00am - Panel: Innovation in Aerospace Manufacturing</li>
            <li>10:30am - Case Studies: Operational Excellence Achievements</li>
            <li>12:00pm - Lunch</li>
            <li>1:30pm - Closing Keynote: "The Future of Aerospace Production" by Carlos Rivera</li>
            <li>3:00pm - Summit Conclusion</li>
        </ul>
        <h2>Who Should Attend</h2>
        <ul>
            <li>Aerospace Manufacturers and Suppliers</li>
            <li>Engineers</li>
            <li>Individuals focused on Aerospace, Manufacturing Solutions, Quality Assurance, Engineering, and Operations</li>
        </ul>
        <h2>Location Details</h2>
        <p><strong>Seattle Aerospace Center</strong></p>
        <p>9725 E Marginal Way S<br />
        Seattle, WA <br />
        98108</p>
