      Value: |
        <h2>Overview</h2>
        <p>This webinar series addresses the critical challenges facing supply chain professionals in today's complex global environment. Expert speakers will share strategies for building resilient supply networks, managing supplier relationships, and leveraging technology to improve visibility and responsiveness. Participants will learn practical approaches to mitigating supply chain risks while maintaining operational efficiency.</p>
        <h2>What to Expect</h2>
        <p>A virtual webinar series featuring a presentation on "<strong>Supply Chain Risk Management Frameworks</strong>" by <strong>Emily Rodriguez</strong>, a segment on <strong>Technology Solutions for Supply Chain Visibility</strong>, and a panel discussion on <strong>Real-World Supply Chain Challenges</strong>.</p>
        <h2>Agenda</h2>
        <ul>
            <li>11:00am - Welcome &amp; Introduction</li>
            <li>11:10am - Presentation: "Supply Chain Risk Management Frameworks" by Emily Rodriguez</li>
            <li>11:40am - Technology Solutions for Supply Chain Visibility</li>
            <li>12:10pm - Panel Discussion: Real-World Supply Chain Challenges</li>
            <li>12:45pm - Q&amp;A and Closing</li>
        </ul>
        <h2>A Must-Attend Event For</h2>
        <p>Supply chain professionals seeking <strong>practical approaches</strong> and <strong>expert strategies</strong> to mitigate risks and improve visibility and responsiveness in complex global supply networks.</p>
        <h2>Location Details</h2>
        <p><strong>Virtual Platform</strong></p>
        <p>Online webinar accessible via registration link</p>
