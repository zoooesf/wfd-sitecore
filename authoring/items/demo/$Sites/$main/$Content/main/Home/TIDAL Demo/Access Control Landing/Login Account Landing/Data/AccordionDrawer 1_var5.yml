    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "How does this differ from Attestation Locked Down?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Login Account Locked Down verifies WHO is accessing content through credential authentication. Attestation Locked Down verifies that users have READ and AGREED to specific terms or conditions. Login focuses on identity verification, while attestation focuses on informed consent. Both can be used independently or combined for content requiring both identity confirmation and documented acknowledgment.</p></div>
