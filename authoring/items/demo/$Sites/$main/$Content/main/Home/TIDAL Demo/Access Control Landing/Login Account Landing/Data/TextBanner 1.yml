    - ID: "c3c248a3-843e-4b19-a2e6-40d9a1352126"
      Hint: subheading
      Value: |
        <div class="ck-content"><p>Login Account Locked Down transforms any content into a members-only resource with a single click. When enabled, visitors must authenticate with valid user credentials before viewing protected materials. This feature seamlessly integrates with your existing user management system, supporting SSO providers, multi-factor authentication, and role-based permissions. Perfect for membership sites, internal documentation, client portals, premium content, or any resource requiring verified user identity. The system automatically manages sessions, handles timeout controls, and remembers user destinations for a frictionless experience once authenticated.</p></div>
