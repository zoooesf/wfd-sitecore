    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "Can I update attestation text after users have already agreed?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Yes. Attestation Lockdown includes version control that lets you update terms at any time. When you modify attestation text, you can mark it as a new version. The system tracks which users agreed to which version, and you can optionally require users to re-attest when accessing content after terms have changed. Historical attestation records remain intact, showing the exact text each user agreed to and when.</p></div>
