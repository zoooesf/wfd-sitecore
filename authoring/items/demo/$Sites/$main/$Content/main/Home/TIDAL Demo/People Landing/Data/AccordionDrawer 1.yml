      Value: "Can I combine multiple filters at once?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Yes! Our deep linking system supports multiple query parameters simultaneously. You can combine event types, date ranges, and topics in a single URL. For example, "#type=webinar&amp;topic=leadership&amp;month=june" would show only leadership webinars happening in June. This creates highly targeted entry points for specific audience segments and specialized campaigns.</p></div>
