    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "What authentication methods are supported?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Login Account Locked Down supports a wide range of authentication methods including username/password, single sign-on (SSO) providers like Okta and Azure AD, SAML 2.0, OAuth 2.0, LDAP directories, social authentication (Google, Facebook, LinkedIn), and multi-factor authentication (MFA). You can configure multiple authentication methods simultaneously and let users choose their preferred login option.</p></div>
