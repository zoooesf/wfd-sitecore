        <h2>Overview</h2>
        <p>This comprehensive three-day certification program equips nonprofit professionals with the skills needed to effectively manage grant programs from application through reporting. Participants will learn grant writing best practices, budget development, compliance requirements, impact measurement, and relationship management with funding organizations.</p>
        <h2>Key Topics</h2>
        <ul>
            <li><strong>Grant Writing</strong> Fundamentals and Best Practices</li>
            <li><strong>Grant Landscape</strong> and Funding Trends</li>
            <li><strong>Grant Research</strong> and Identification</li>
            <li><strong>Budget Development</strong> and Compliance/Reporting Requirements</li>
            <li><strong>Grant Management Systems</strong> and Tools</li>
            <li><strong>Impact Measurement and Evaluation</strong></li>
            <li>Building <strong>Funder Relationships</strong></li>
        </ul>
        <h2>Agenda</h2>
        <p><strong>Day 1 - April 29</strong></p>
        <ul>
            <li>9:00am - Welcome &amp; Program Overview</li>
            <li>9:30am - Grant Landscape and Funding Trends by Sarah Mitchell</li>
            <li>11:00am - Workshop: Grant Research and Identification</li>
            <li>12:30pm - Lunch</li>
            <li>1:30pm - Grant Writing Fundamentals by Aisha Patel</li>
            <li>3:00pm - Practice Exercise: Proposal Development</li>
            <li>4:00pm - Day 1 Close</li>
        </ul>
        <p><strong>Day 2 - April 30</strong></p>
        <ul>
            <li>9:00am - Budget Development for Grant Proposals</li>
            <li>10:30am - Compliance and Reporting Requirements</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Grant Management Systems and Tools by Samantha Brooks</li>
            <li>2:30pm - Workshop: Building Funder Relationships</li>
            <li>4:00pm - Day 2 Close</li>
        </ul>
        <p><strong>Day 3 - May 1</strong></p>
        <ul>
            <li>9:00am - Impact Measurement and Evaluation</li>
            <li>10:30am - Panel: Success Stories and Lessons Learned with Rachel Thompson</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Final Project: Complete Grant Proposal</li>
            <li>3:00pm - Presentations and Feedback</li>
            <li>4:00pm - Certificate Ceremony</li>
        </ul>
        <h3>Who Should Attend</h3>
        <ul>
            <li>Nonprofit Professionals</li>
            <li>Individuals focused on Grant Programs, Advocacy, Training &amp; Development, and Planning Tools</li>
        </ul>
        <h2>Industry Testimonials</h2>
        <blockquote>
        <p>"I feel fully prepared to manage our organization's $2 million grant portfolio now. The deep dive into compliance and reporting requirements was essential for certification." &mdash; <em>Mark Davis, Grant Program Coordinator, Youth Services Network</em></p>
        </blockquote>
        <blockquote>
        <p>"The best professional development I've had all year. The instruction on funder relationship management provided the strategic perspective I needed to move from tactical writing to strategic program development." &mdash; <em>Jennifer Kim, Development Director, Environmental Advocacy Fund</em></p>
        </blockquote>
        <h2>Location Details</h2>
        <p><strong>Washington DC Nonprofit Center</strong></p>
        <p>1400 I St NW<br />
        Washington, DC <br />
        20005</p>
