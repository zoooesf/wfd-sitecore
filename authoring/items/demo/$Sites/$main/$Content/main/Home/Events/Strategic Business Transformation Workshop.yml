      Hint: body
      Value: |
        <h2>Overview</h2>
        <p>This intensive two-day workshop equips consulting and professional services leaders with the frameworks and tools needed to successfully guide clients through major business transformations. Participants will engage in hands-on exercises, case study analysis, and peer collaboration to master change management methodologies and strategic planning techniques that deliver measurable results.</p>
        <h2>Key Topics</h2>
        <ul>
            <li>The <strong>Art and Science of Change</strong></li>
            <li>Mastering <strong>Change Management</strong> Methodologies</li>
            <li><strong>Business Analysis</strong> and Strategic Planning</li>
            <li><strong>Stakeholder Mapping and Engagement</strong></li>
            <li>Developing a <strong>Transformation Roadmap</strong></li>
            <li><strong>Overcoming Resistance to Change</strong></li>
        </ul>
        <h2>What to Expect</h2>
        <p>A two-day, immersive workshop format featuring a presentation by <strong>James Patterson</strong> on "The Art and Science of Change", exercises like <strong>Stakeholder Mapping</strong>, a deep dive into <strong>Business Analysis</strong> with <strong>Jennifer Kim</strong>, and a <strong>Best Practices Panel</strong> with <strong>Gregory Walsh</strong>.</p>
        <h2>Agenda</h2>
        <p><strong>Day 1 - April 22</strong></p>
        <ul>
            <li>8:30am - Registration &amp; Coffee</li>
            <li>9:00am - Workshop Opening: "The Art and Science of Change" by James Patterson</li>
            <li>10:30am - Exercise: Stakeholder Mapping and Engagement</li>
            <li>12:00pm - Working Lunch</li>
            <li>1:00pm - Business Analysis Deep Dive with Jennifer Kim</li>
            <li>3:00pm - Group Activity: Transformation Roadmap Development</li>
            <li>4:00pm - Day 1 Wrap-up</li>
        </ul>
        <p><strong>Day 2 - April 23</strong></p>
        <ul>
            <li>8:30am - Continental Breakfast</li>
            <li>9:00am - Strategy Implementation Framework</li>
            <li>10:30am - Workshop: Overcoming Resistance to Change</li>
            <li>12:00pm - Lunch</li>
            <li>1:00pm - Case Study Presentations</li>
            <li>2:30pm - Best Practices Panel with Gregory Walsh</li>
            <li>3:30pm - Certificate Presentation &amp; Closing</li>
        </ul>
        <h2>Who Should Attend</h2>
        <ul>
            <li>Consulting Leaders</li>
            <li>Professional Services Leaders</li>
            <li>Individuals focused on Strategy Consulting, Change Management, Business Analysis, and Operations</li>
        </ul>
        <h2>Location Details</h2>
        <p><strong>Boston Business Institute</strong></p>
        <p>225 Franklin St<br />
        Boston, MA <br />
        02110</p>
