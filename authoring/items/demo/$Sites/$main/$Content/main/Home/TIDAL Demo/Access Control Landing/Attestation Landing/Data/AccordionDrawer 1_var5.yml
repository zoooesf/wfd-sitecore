    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "How is Attestation Lockdown different from Login Account Locked Down?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Attestation Lockdown verifies that users have READ and AGREED to specific terms or conditions, creating documented consent records. Login Account Locked Down verifies WHO is accessing content through credential authentication. Attestation focuses on informed consent and legal acknowledgment, while login focuses on identity verification. Both features serve distinct purposes and can be combined for content requiring both authenticated identity and documented agreement to terms.</p></div>
