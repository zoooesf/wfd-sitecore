    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "What happens if someone tries to access protected content without proper credentials?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Unauthorized users are redirected to the appropriate access flow. For user-login protected content, they'll see a login prompt. For attestation-required content, they'll encounter the attestation agreement. The system remembers their intended destination and redirects them after successful authentication or attestation.</p></div>
