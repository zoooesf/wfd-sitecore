    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "Can I control access for different user groups?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Yes. Login Account Locked Down includes robust role-based access control (RBAC). Create user groups, assign roles with specific permissions, and apply different access rules to different content. For example, you might grant "managers" access to financial reports while "employees" can only view general company updates. Permissions can be as broad or granular as your needs require.</p></div>
