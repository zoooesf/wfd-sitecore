    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "The Clean Energy Tripling Pledge: Utilities & Energy Sector Metrics"
    - ID: "c3c248a3-843e-4b19-a2e6-40d9a1352126"
      Hint: subheading
      Value: Tracking the monumental rise in global renewable capacity and the core metrics for Clean Energy adoption through 2030.
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content">
        <p>The global commitment to triple renewable energy capacity by 2030 places the <strong>Utilities &amp; Energy</strong> sector at the center of the largest transformation in its history. This endeavor requires not only massive investment but also a rigorous framework of metrics to track progress in <strong>Clean Energy</strong> adoption.</p>
        <p>Global annual renewable capacity additions are forecast to rise from <strong>666 GW in 2024</strong> to almost <strong>935 GW by 2030</strong>. This growth, largely driven by Solar PV and wind (accounting for 95% of additions), is a direct result of declining generation costs and supportive policies.</p>
        <h3><strong>Forecasted Global Renewable Capacity Expansion (2024-2030)</strong></h3>
        <p>The chart below illustrates the forecast for cumulative capacity additions in gigawatts (GW) by major technology and region, emphasizing the scale of the expansion.</p>
        <table>
            <thead>
                <tr>
                    <th>Region / Technology</th>
                    <th>2024 Capacity Additions (GW)</th>
                    <th>2030 Forecast Additions (GW)</th>
                    <th>Cumulative Capacity Growth (2024-2030)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td style="text-align:left;"><strong>Global Total (Main Case)</strong></td>
                    <td style="text-align:left;">666</td>
                    <td style="text-align:left;">935</td>
                    <td style="text-align:left;"><strong>5,520+ GW</strong></td>
                </tr>
                <tr>
                    <td style="text-align:left;"><strong>China (Total Renewables)</strong></td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;"><strong>3,207 GW</strong></td>
                </tr>
                <tr>
                    <td style="text-align:left;"><strong>United States (Total Renewables)</strong></td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;"><strong>~500 GW</strong></td>
                </tr>
                <tr>
                    <td style="text-align:left;"><strong>Solar PV (Utility-scale &amp; Distributed)</strong></td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;">-</td>
                    <td style="text-align:left;"><strong>~80% of Total Expansion</strong></td>
                </tr>
            </tbody>
        </table>
        <p>A key metric is the growth of <strong>distributed applications</strong> (residential, commercial, industrial), which are projected to make up almost <strong>40% of the overall PV expansion</strong>. This shift points to the democratization of energy production.</p>
        <p><strong>Challenges to Watch:</strong> While capacity is surging, critical challenges for the sector include slow grid infrastructure expansion, high financing costs for new projects, and long permitting wait times that reduce the volume of projects capable of participating in competitive auctions. Policy certainty remains a major lever for sustained deployment, underscoring the importance of national strategies like Canada's Clean Electricity Strategy.</p>
        </div>
