      Hint: body
      Value: |
        <h2>Overview</h2>
        <p>This intensive workshop focuses on implementing quality improvement initiatives and patient safety protocols in healthcare settings. Clinical leaders, quality managers, and patient safety officers will explore evidence-based practices, regulatory compliance requirements, and systematic approaches to reducing errors and improving patient outcomes.</p>
        <h2>What to Expect</h2>
        <p>A two-day intensive workshop opening with a session on "<strong>Culture of Safety</strong>" by <strong>Maria Gonzalez</strong>, including an interactive exercise on <strong>Root Cause Analysis</strong>, a session on <strong>Patient Safety Protocols</strong> by <strong>Patricia Johnson</strong>, and coverage of <strong>Technology Tools for Quality Management</strong> by <strong>David Kowalski</strong>.</p>
        <h2>Agenda</h2>
        <p><strong>Day 1 - June 3</strong></p>
        <ul>
            <li>8:00am - Registration &amp; Breakfast</li>
            <li>8:30am - Workshop Opening: "Culture of Safety" by Maria Gonzalez</li>
            <li>10:00am - Quality Improvement Methodologies</li>
            <li>11:30am - Interactive Exercise: Root Cause Analysis</li>
            <li>12:30pm - Lunch</li>
            <li>1:30pm - Patient Safety Protocols and Guidelines by Patricia Johnson</li>
            <li>3:00pm - Workshop: Incident Reporting and Analysis</li>
            <li>4:30pm - Day 1 Conclusion</li>
        </ul>
        <p><strong>Day 2 - June 4</strong></p>
        <ul>
            <li>8:00am - Continental Breakfast</li>
            <li>8:30am - Compliance and Accreditation Requirements</li>
            <li>10:00am - Technology Tools for Quality Management by David Kowalski</li>
            <li>11:30am - Case Studies: Quality Improvement Success Stories</li>
            <li>12:30pm - Lunch</li>
            <li>1:30pm - Action Planning Workshop</li>
            <li>3:30pm - Closing Session &amp; Certificate Distribution</li>
        </ul>
        <h2>A Must-Attend Event For</h2>
        <p>Clinical leaders, quality managers, and safety officers who need to implement <strong>systematic approaches</strong> and <strong>evidence-based practices</strong> to reduce errors and improve patient outcomes.</p>
        <h2>Location Details</h2>
        <p><strong>Minneapolis Healthcare Institute</strong></p>
        <p>710 S 2nd St<br />
        Minneapolis, MN <br />
        55401</p>
