      Value: Search and Filter BasicsContent
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>The People Listing interface starts with a simple search bar supporting natural language queries. Results are ranked by relevance, considering matching skills, functional titles, and department hierarchy. Upon executing a search, filtering tools appear, allowing refinement by location, department, role, and custom skill tags. Filters can be stacked (e.g., "Find all nurses in the Cardiac Unit located in Hospital A") and are displayed as active, removable chips for intuitive control.</p></div>
