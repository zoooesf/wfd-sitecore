    - ID: "c23b27d3-398e-4a60-994a-b2257fb29b63"
      Hint: heading
      Value: "Why Categorize Search Results?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Grouping results by content type solves the relevance problem. When a user searches for "AI strategy," they may want a Generic Page (the corporate strategy doc), an Insight (expert analysis), or an Article (a recent blog post). Categorization allows the user to click the appropriate tab and instantly filter out irrelevant result types, speeding up their decision-making process.</p></div>
