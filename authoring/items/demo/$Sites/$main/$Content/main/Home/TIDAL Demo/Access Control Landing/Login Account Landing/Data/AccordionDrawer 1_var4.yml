      Hint: heading
      Value: "What happens to users who aren't logged in?"
    - ID: "d71bc2be-4f73-46f8-808c-86cbe11ad047"
      Hint: body
      Value: |
        <div class="ck-content"><p>Users attempting to access protected content without valid authentication are immediately redirected to your login page. The system preserves their intended destination URL, so after successful login, they're automatically returned to the content they were trying to reach. This creates a seamless experience that doesn't interrupt their workflow while maintaining security.</p></div>
