      Hint: description
      Value: |
        <p>Thomas Anderson has dedicated 26 years to ensuring reliable power delivery for communities across the Upper Midwest. As Senior Director of Operations at Regional Power &amp; Light, he manages the operation and maintenance of electrical infrastructure serving 1.2 million customers. Thomas has successfully navigated the utility through multiple major weather events, implementing emergency response protocols that have minimized outage durations and improved customer communication during crises.</p>
        <p>His expertise spans transmission and distribution operations, vegetation management, regulatory compliance, and workforce development. Thomas holds a degree in Electrical Engineering from the University of Minnesota and has earned multiple certifications in utility operations and safety management. He has been instrumental in modernizing the utility's grid infrastructure, implementing advanced metering systems, and integrating renewable energy sources. Thomas serves on industry committees focused on grid reliability standards and is respected for his commitment to safety, reliability, and customer service.</p>
