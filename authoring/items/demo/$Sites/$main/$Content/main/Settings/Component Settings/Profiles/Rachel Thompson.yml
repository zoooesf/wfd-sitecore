      Hint: description
      Value: |
        <p>Rachel Thompson is an education innovator with 21 years of experience as both a classroom teacher and district administrator. As Chief Academic Officer for Metropolitan School District, she oversees curriculum and instruction for 65,000 students across 120 schools. Rachel has led the district's transformation into a model for STEM education, implementing project-based learning approaches and integrating technology in ways that have significantly improved student engagement and achievement scores.</p>
        <p>A former National Teacher of the Year finalist, Rachel holds a Doctorate in Educational Leadership from Arizona State University. She has secured millions in grants to support teacher professional development and educational technology initiatives. Rachel is passionate about closing achievement gaps and ensuring all students have access to rigorous, relevant learning experiences. She frequently presents at national education conferences and has published articles on effective instructional leadership and equity in education.</p>
