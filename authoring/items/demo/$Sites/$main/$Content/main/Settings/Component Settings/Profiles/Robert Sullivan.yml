      Hint: description
      Value: |
        <p>Rob Sullivan is a seasoned financial advisor with over 25 years of experience helping high-net-worth individuals and families achieve their financial goals. As Senior Managing Partner at Cornerstone Financial Advisors, he leads a team of 30 advisors managing over $2 billion in client assets. Rob specializes in comprehensive wealth management, including investment portfolio construction, tax optimization strategies, estate planning, and retirement income planning.</p>
        <p>A Certified Financial Planner (CFP) and Chartered Financial Analyst (CFA), Rob has been consistently recognized as one of the top financial advisors in the Southeast region. He holds a degree in Finance from the University of North Carolina and has served on the board of the Financial Planning Association. Rob is known for his client-first philosophy and his ability to simplify complex financial concepts, making him a trusted advisor to business owners, executives, and multi-generational families.</p>
