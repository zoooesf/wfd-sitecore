        <p>Dr. Emily Rodriguez is a board-certified physician with over 20 years of clinical and administrative experience in healthcare delivery. As Chief Medical Officer at Metropolitan Health System, she oversees clinical operations across a network of 12 hospitals and 80+ outpatient facilities, ensuring the highest standards of patient care and safety. Her leadership has resulted in significant improvements in patient outcomes, including a 25% reduction in hospital-acquired infections and improved patient satisfaction scores.</p>
        <p>Dr. Rodriguez completed her medical training at Johns Hopkins University and her residency in Internal Medicine at Massachusetts General Hospital. She is a strong advocate for healthcare equity and has implemented numerous programs to improve access to care for underserved communities. Dr. Rodriguez serves on the board of the American Medical Association and is a thought leader on value-based care delivery models and clinical quality improvement.</p>
