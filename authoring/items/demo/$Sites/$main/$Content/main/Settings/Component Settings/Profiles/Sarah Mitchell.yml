      Hint: description
      Value: |
        <p>Sarah Mitchell brings over 18 years of experience in strategic consulting, specializing in helping Fortune 500 companies navigate complex organizational transformations. Her expertise spans digital transformation initiatives, change management frameworks, and enterprise-wide strategic planning. Sarah has led consulting engagements across multiple industries, including financial services, healthcare, and technology.</p>
        <p>Prior to joining Apex Consulting Group, Sarah spent a decade at a Big Four consulting firm where she directed the North American Change Management practice. She holds an MBA from Harvard Business School and is a frequent speaker at industry conferences on the future of work and organizational resilience. Sarah's client-centric approach and data-driven methodologies have helped organizations achieve measurable improvements in operational efficiency and employee engagement.</p>
