        <p>Member of the <strong>Association of Strategic Planning (ASP)</strong>. Serves on the advisory board for the <strong>Professional Services Council (PSC)</strong>. She is also a Fellow at the <strong>Management Consulting Institute (MCI)</strong>.</p>
