      Hint: description
      Value: |
        <p>James Patterson has spent his 22-year career revolutionizing manufacturing operations through lean principles and continuous improvement methodologies. At Precision Manufacturing Corp, he oversees production facilities responsible for manufacturing critical components for the automotive and aerospace industries. Under his leadership, the company has achieved ISO 9001 certification and reduced production defects by 40% while increasing throughput by 35%.</p>
        <p>A certified Lean Six Sigma Master Black Belt, James has trained over 500 professionals in operational excellence practices. He began his career as a production engineer and worked his way up through various operational roles, gaining deep expertise in process optimization, quality systems, and supply chain management. James holds a degree in Industrial Engineering from Purdue University and is a frequent contributor to industry publications on advanced manufacturing techniques.</p>
