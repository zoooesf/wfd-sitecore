      Hint: description
      Value: |
        <p>Patricia Johnson has spent 24 years ensuring financial institutions operate with the highest standards of regulatory compliance and ethical conduct. As Chief Compliance Officer at First National Bank, she oversees enterprise-wide compliance programs covering anti-money laundering, consumer protection, fair lending, and privacy regulations. Her proactive compliance management approach has helped the bank navigate complex regulatory requirements while maintaining a strong reputation with regulators and customers alike.</p>
        <p>Patricia holds a law degree from Wake Forest University and several compliance certifications including Certified Regulatory Compliance Manager (CRCM). She has successfully led the bank through multiple regulatory examinations with consistently strong results. Patricia has built a culture of compliance throughout the organization through comprehensive training programs and clear communication of regulatory expectations. She regularly presents at industry conferences on emerging compliance risks and best practices, and serves on the compliance advisory board for the American Bankers Association.</p>
