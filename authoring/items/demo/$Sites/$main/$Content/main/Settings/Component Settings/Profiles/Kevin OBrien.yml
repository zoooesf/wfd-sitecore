      Hint: description
      Value: |
        <p>Kevin O'Brien is at the forefront of manufacturing innovation with 20 years of experience in automation and advanced manufacturing technologies. As Chief Technology Officer at Advanced Manufacturing Systems, he leads R&amp;D efforts developing next-generation robotics and AI-powered manufacturing solutions. Kevin's innovations have helped manufacturers increase productivity by 50% while improving product quality and reducing workplace injuries through intelligent automation systems.</p>
        <p>A mechanical engineer by training, Kevin holds multiple patents in robotics and automation technologies. He has led the implementation of Industry 4.0 solutions that integrate IoT, machine learning, and advanced analytics to create smart factories. Kevin earned his degree from MIT and has served as an advisor to the Manufacturing USA network. He is passionate about reshoring manufacturing to the United States through technology advancement and regularly collaborates with universities to develop the skilled workforce needed for advanced manufacturing.</p>
