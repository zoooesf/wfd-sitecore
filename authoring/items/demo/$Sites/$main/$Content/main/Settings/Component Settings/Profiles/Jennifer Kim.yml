      Hint: description
      Value: |
        <p>Dr. Jennifer Kim is a leading oncologist and clinical researcher dedicated to advancing cancer treatment through innovative research. As Director of Clinical Research at the Advanced Cancer Research Institute, she oversees multiple phase II and phase III clinical trials investigating novel immunotherapy and targeted therapy approaches. Her research has contributed to FDA approvals of three new cancer treatments, offering hope to thousands of patients with previously limited treatment options.</p>
        <p>Dr. Kim completed her medical degree and oncology fellowship at Columbia University and has published over 75 peer-reviewed articles in prestigious medical journals. She maintains an active clinical practice, treating patients while simultaneously conducting groundbreaking research. Her patient-centered approach ensures that clinical trial design considers quality of life alongside survival outcomes. Dr. Kim has received numerous awards for her contributions to cancer research and serves as a mentor to the next generation of physician-scientists.</p>
