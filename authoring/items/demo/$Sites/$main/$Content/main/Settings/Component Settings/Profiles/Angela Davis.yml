      Hint: description
      Value: |
        <p>Angela Davis is a strategic HR leader with 19 years of experience building high-performance organizations through innovative people practices. As Chief Human Resources Officer at Global Enterprises Inc, she oversees all aspects of human capital management for a workforce of 35,000 employees across multiple countries. Angela has transformed the organization's talent strategy, implementing data-driven approaches to recruitment, development, and retention that have improved employee engagement scores by 35% and reduced turnover by 28%.</p>
        <p>Angela holds a Master's degree in Industrial-Organizational Psychology from NYU and is a Senior Certified Professional (SHRM-SCP). She has led major organizational transformations, including post-merger integrations, culture change initiatives, and digital workplace transformations. Angela is a champion for diversity, equity, and inclusion, having established programs that have significantly improved representation at all organizational levels. She serves on the board of the Society for Human Resource Management and is a sought-after speaker on the future of work and employee experience design.</p>
