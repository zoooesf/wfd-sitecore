      Hint: description
      Value: |
        <p>Dr. Jonathan Lee is an accomplished research administrator who has helped National Research University achieve record-breaking research funding levels. As Vice President for Research, he oversees the university's entire research enterprise, including sponsored programs, research compliance, technology transfer, and core research facilities. Under his leadership, annual research expenditures have grown from $450 million to over $800 million, and the university has established numerous industry partnerships that translate research into real-world applications.</p>
        <p>Dr. Lee holds a Ph.D. in Biochemistry from Duke University and spent 10 years as a faculty researcher before transitioning to research administration. He has successfully built interdisciplinary research centers, streamlined grant application processes, and established programs supporting early-career researchers. Jonathan is nationally recognized for his expertise in research development and serves on several federal advisory committees. He is passionate about making research more accessible, efficient, and impactful for both the academic community and society at large.</p>
