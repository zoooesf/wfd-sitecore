      Hint: description
      Value: |
        <p>Carlos Rivera is a construction industry veteran with 27 years of experience delivering complex infrastructure projects on time and within budget. As Senior Vice President of Operations at BuildRight Construction Group, he oversees multiple concurrent projects with combined values exceeding $2 billion, including highways, bridges, commercial buildings, and industrial facilities. Carlos has built a reputation for operational excellence, with his projects consistently achieving top safety ratings and quality benchmarks.</p>
        <p>Carlos began his career as a field engineer and has held progressively responsible positions in project management, estimating, and operations. He holds a degree in Civil Engineering from Arizona State University and multiple project management certifications. Under his leadership, BuildRight has won numerous awards for project excellence and safety performance. Carlos is deeply committed to workforce development, having established apprenticeship programs that have trained hundreds of skilled tradespeople. He serves on the board of the Associated General Contractors and advocates for infrastructure investment and construction industry innovation.</p>
