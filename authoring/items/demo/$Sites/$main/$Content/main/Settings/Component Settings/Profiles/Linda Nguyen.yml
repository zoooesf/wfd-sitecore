      Hint: description
      Value: |
        <p>Linda Nguyen is a passionate community advocate with 14 years of experience in nonprofit leadership and social impact work. As Executive Director of Community First Alliance, she oversees programs that serve over 50,000 individuals annually, focusing on housing security, workforce development, and food access. Under her leadership, the organization has doubled its funding base and expanded services to three major cities on the West Coast.</p>
        <p>Linda began her career as a community organizer and has dedicated her life to addressing systemic inequities. She holds a Master's degree in Public Policy from UC Berkeley and has successfully secured over $20 million in grants from foundations, government agencies, and corporate partners. Linda serves on multiple nonprofit boards and is a sought-after speaker on topics including community-led development, strategic partnerships, and sustainable nonprofit growth. Her collaborative approach has built strong coalitions across sectors to create lasting community impact.</p>
