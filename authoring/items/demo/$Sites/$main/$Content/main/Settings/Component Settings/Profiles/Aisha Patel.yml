      Hint: description
      Value: |
        <p>Dr. Aisha Patel is an accomplished academic administrator with 16 years of experience in higher education leadership. As Dean of Academic Affairs at University of the Americas, she oversees curriculum development, faculty development, and academic program assessment for over 15,000 students. Her innovative approach to education has led to the development of interdisciplinary programs that bridge traditional academic boundaries and prepare students for the evolving workforce.</p>
        <p>Dr. Patel earned her Ph.D. in Educational Leadership from Stanford University and has published extensively on pedagogy, student retention, and inclusive education practices. She has championed initiatives that have increased graduation rates by 18% and improved first-generation student success. Passionate about educational equity, Dr. Patel has established partnerships with community colleges to create seamless transfer pathways and has been recognized with the National Academic Leadership Award.</p>
