Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Replace Tidal Placeholder Settings
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            Write-Verbose "Invoke-ModuleScriptBody - Begin"
        }
    
        process {
            $sitePath = $Site.Paths.Path
            Write-Verbose "Target site: $sitePath"
    
            # Paths
            $branchPath = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Tidal Placeholder Settings"
            $branch = Get-Item -Path $branchPath
    
            if (-not $branch) {
                Write-Warning "Branch template not found at $branchPath"
                return
            }
    
            $branchChild = Get-ChildItem -Path $branch.Paths.Path | Where-Object { $_.Name -eq "Partial Design" }
            if (-not $branchChild) {
                Write-Warning "Branch template does not contain 'Partial Design'"
                return
            }
    
            # Destination: site’s Placeholder Settings folder
            $phSettingsPath = "$sitePath/Presentation/Placeholder Settings"
            $phSettings = Get-Item -Path $phSettingsPath -ErrorAction SilentlyContinue
            if (-not $phSettings) {
                Write-Warning "Placeholder Settings folder not found at $phSettingsPath"
                return
            }
    
            # Find existing site Partial Design
            $targetPartialDesign = Get-ChildItem -Path $phSettings.Paths.Path | Where-Object { $_.Name -eq "Partial Design" }
            $tempItem = $null
            $tempName = $null
    
            if ($targetPartialDesign) {
                $tempName = "Partial Design_BACKUP_" + [guid]::NewGuid().ToString("N")
                Write-Verbose "Renaming existing 'Partial Design' to $tempName"
                Rename-Item -Path $targetPartialDesign.Paths.Path -NewName $tempName
                $tempItem = Get-ChildItem -Path $phSettings.Paths.Path | Where-Object { $_.Name -eq $tempName }
            }
    
            # Copy new Partial Design from branch
            Write-Verbose "Copying branch 'Partial Design' into site Placeholder Settings"
            Copy-Item -Path $branchChild.Paths.Path -Destination $phSettings.Paths.Path -Recurse
    
            # Validate copy worked
            $newPartial = Get-ChildItem -Path $phSettings.Paths.Path | Where-Object { $_.Name -eq "Partial Design" }
            if ($newPartial) {
                Write-Verbose "New 'Partial Design' copied successfully"
                if ($tempItem) {
                    Write-Verbose "Removing old backup Partial Design"
                    Remove-Item -Path $tempItem.Paths.Path -Recurse -Force
                }
            }
            else {
                Write-Warning "New 'Partial Design' did not copy correctly. Restoring backup..."
                if ($tempItem -and $tempName) {
                    Rename-Item -Path $tempItem.Paths.Path -NewName "Partial Design"
                    Write-Verbose "Backup restored as 'Partial Design'"
                }
            }
        }
    
        end {
            Write-Verbose "Invoke-ModuleScriptBody - End"
        }
    }
