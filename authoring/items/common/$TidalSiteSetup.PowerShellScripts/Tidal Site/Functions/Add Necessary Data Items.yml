Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Add Necessary Data Items
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        process {
            $sitePath = $Site.Paths.Path
            $siteDataRoot = "$sitePath/Data"
            $branchRoot   = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Tidal Necessary Data Items"
    
            $siteDataItem = Get-Item -Path $siteDataRoot -ErrorAction SilentlyContinue
            if (-not $siteDataItem) { return }
    
            $branchItem = Get-Item -Path $branchRoot -ErrorAction SilentlyContinue
            if (-not $branchItem) { return }
    
            $branchFolders = Get-ChildItem -Path $branchItem.Paths.Path -ErrorAction SilentlyContinue
            foreach ($branchFolder in $branchFolders) {
                $folderName = $branchFolder.Name
                $siteFolderPath = "$siteDataRoot/$folderName"
                $siteFolder = Get-Item -Path $siteFolderPath -ErrorAction SilentlyContinue
                if (-not $siteFolder) { continue }
    
                $branchChildren = Get-ChildItem -Path $branchFolder.Paths.Path -ErrorAction SilentlyContinue
                foreach ($branchChild in $branchChildren) {
                    $destChildPath = "$siteFolderPath/$($branchChild.Name)"
                    Remove-Item -Path $destChildPath -Recurse -Force -ErrorAction SilentlyContinue
                    Copy-Item -Path $branchChild.Paths.Path -DestinationItem $siteFolder -Recurse -Force
                }
            }
        }
    }
