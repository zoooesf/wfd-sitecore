ID: "3d48d4b2-dc22-40b6-a862-2d48b83180f6"
Parent: "3d0abd5f-73e5-47b7-8e03-b4f878441620"
Template: "dd22f1b3-bd87-4db2-9e7d-f7a496888d43"
Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Configure Page Design Mappings
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            $sitePath = $Site.Paths.Path
            $sitePageDesignsPath   = "$sitePath/Presentation/Page Designs"
            $branchPageDesignsPath = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Tidal Page Design Folder/Page Designs"
        }
    
        process {
            # Get branch Page Designs folder
            $branchPageDesigns = Get-Item -Path $branchPageDesignsPath -ErrorAction SilentlyContinue
            if (-not $branchPageDesigns) { return }
    
            $branchTemplatesMapping = $branchPageDesigns.Fields["TemplatesMapping"].Value
            if ([string]::IsNullOrWhiteSpace($branchTemplatesMapping)) { return }
    
            # Decode mapping and split into template=pageDesign pairs
            $decodedMapping = [System.Web.HttpUtility]::UrlDecode($branchTemplatesMapping)
            $pairs = $decodedMapping -split "&"
    
            $newPairs = @()
    
            # Get site Page Designs folder
            $sitePageDesigns = Get-Item -Path $sitePageDesignsPath -ErrorAction SilentlyContinue
            if (-not $sitePageDesigns) { return }
    
            foreach ($pair in $pairs) {
                $kv = $pair -split "="
                if ($kv.Length -ne 2) { continue }
    
                $templateGuid = $kv[0]  # Keep braces {}
                $pageDesignGuid = $kv[1] # Keep braces {}
    
                # Get template item
                $templateItem = Get-Item -Path $templateGuid -ErrorAction SilentlyContinue
                if (-not $templateItem) { continue }
    
                # Determine corresponding site page design name
                $templateName = $templateItem.Name
                $pageDesignName = if ($templateName -eq "Error Page") { "404 Page" } else { $templateName }
    
                # Find matching site page design
                $sitePageDesignItem = Get-ChildItem -Path $sitePageDesignsPath -Recurse |
                    Where-Object { $_.TemplateName -eq "Page Design" -and $_.Name -eq $pageDesignName }
    
                if (-not $sitePageDesignItem) { continue }
    
                $newPairs += "{0}={1}" -f $templateGuid, $sitePageDesignItem.ID
            }
    
            # Re-encode and save
            $newMappingValue = [System.Web.HttpUtility]::UrlEncode(($newPairs -join "&"))
    
            $sitePageDesigns.Editing.BeginEdit()
            try {
                $sitePageDesigns.Fields["TemplatesMapping"].Value = $newMappingValue
                $sitePageDesigns.Editing.EndEdit()
            }
            catch {
                $sitePageDesigns.Editing.CancelEdit()
                throw $_
            }
        }
    
        end { }
    }
    
