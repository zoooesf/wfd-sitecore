Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Add Tidal Styles
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            Write-Verbose "Invoke-ModuleScriptBody - Begin"
        }
    
        process {
            $sitePath = $Site.Paths.Path
            Write-Verbose "Target site: $sitePath"
    
            # Ensure Styles folder exists
            $stylesPath = "$sitePath/Presentation/Styles"
            if (-not (Test-Path $stylesPath)) {
                Write-Verbose "Creating missing Styles folder..."
                New-Item -ItemType "Common/Folder" -Path "$sitePath/Presentation" -Name "Styles" | Out-Null
            }
    
            # Source branch template
            $branchPath = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Tidal Styles"
            $branch = Get-Item -Path $branchPath
            if (-not $branch) {
                Write-Warning "Branch template not found at $branchPath"
                return
            }
    
            # Destination: site’s Styles folder
            $stylesFolder = Get-Item -Path $stylesPath
    
            # Copy each child from branch into site styles if missing
            foreach ($child in $branch.Children) {
                $existing = Get-ChildItem -Path $stylesFolder.Paths.Path | Where-Object { $_.Name -eq $child.Name }
                if (-not $existing) {
                    Write-Verbose "Adding style: $($child.Name)"
                    Copy-Item -Path $child.Paths.Path -Destination $stylesFolder.Paths.Path -Recurse
                }
                else {
                    Write-Verbose "Skipping existing style: $($child.Name)"
                }
            }
        }
    
        end {
            Write-Verbose "Invoke-ModuleScriptBody - End"
        }
    }
