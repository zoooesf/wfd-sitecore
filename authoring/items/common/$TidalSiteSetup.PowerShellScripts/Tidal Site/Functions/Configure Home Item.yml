Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Configure Home Item
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            Write-Verbose "Invoke-ModuleScriptBody - Begin"
        }
    
        process {
            $sitePath = $Site.Paths.Path
            Write-Verbose "Target site: $sitePath"
    
            # Source branch template Home page
            $branchHomePath = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Home Page/Home new"
            $branchHome = Get-Item -Path $branchHomePath
            if (-not $branchHome) {
                Write-Warning "Branch Home item not found at $branchHomePath"
                return
            }
    
            # Destination: site root
            $siteRoot = Get-Item -Path $sitePath
            if (-not $siteRoot) {
                Write-Warning "Site root not found at $sitePath"
                return
            }
    
            # Copy Home page from branch to site root
            Write-Verbose "Copying Home page to site root..."
            Copy-Item -Path $branchHome.Paths.Path -Destination $siteRoot.Paths.Path  -Recurse
        }
    
        end {
            Write-Verbose "Invoke-ModuleScriptBody - End"
        }
    }
    
