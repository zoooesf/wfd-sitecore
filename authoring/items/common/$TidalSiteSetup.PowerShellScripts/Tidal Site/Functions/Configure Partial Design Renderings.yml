Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Configure Partial Design Renderings
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            Write-Verbose "Invoke-ModuleScriptBody - Begin"
        }
    
        process {
            $sitePath = $Site.Paths.Path
            Write-Verbose "Target site: $sitePath"
    
            # Paths
            $sitePartialsRoot = "$sitePath/Presentation/Partial Designs"
            $branchPartialsRoot = "/sitecore/templates/Branches/Feature/JSS Experience Accelerator/Tidal Site/Tidal Partial Designs"
    
            $sitePartialDesigns = Get-ChildItem -Path $sitePartialsRoot -Recurse -ErrorAction SilentlyContinue |
                Where-Object { $_.TemplateName -eq "Partial Design" }
    
            if (-not $sitePartialDesigns) {
                Write-Warning "No Partial Designs found under $sitePartialsRoot"
                return
            }
    
            foreach ($sitePartial in $sitePartialDesigns) {
                # Figure out relative path after /Partial Designs
                $relativePath = $sitePartial.Paths.Path.Substring($sitePartialsRoot.Length)
    
                $branchPath = "$branchPartialsRoot$relativePath"
                $branchPartial = Get-Item -Path $branchPath -ErrorAction SilentlyContinue
    
                if (-not $branchPartial) {
                    Write-Warning "No matching branch partial for $($sitePartial.Paths.Path) at $branchPath"
                    continue
                }
    
                $branchRenderings = $branchPartial.Fields["__Renderings"].Value
                $branchSignature  = $branchPartial.Fields["Signature"].Value
    
                if ([string]::IsNullOrWhiteSpace($branchRenderings) -and [string]::IsNullOrWhiteSpace($branchSignature)) {
                    Write-Verbose "Branch partial $($branchPartial.Paths.Path) has no renderings or signature, skipping"
                    continue
                }
    
                Write-Verbose "Copying renderings + signature from $($branchPartial.Paths.Path) → $($sitePartial.Paths.Path)"
    
                $sitePartial.Editing.BeginEdit()
                try {
                    if (-not [string]::IsNullOrWhiteSpace($branchRenderings)) {
                        $sitePartial.Fields["__Renderings"].Value = $branchRenderings
                    }
                    if ($null -ne $branchSignature) {
                        $sitePartial.Fields["Signature"].Value = $branchSignature
                    }
                    $sitePartial.Editing.EndEdit()
                }
                catch {
                    $sitePartial.Editing.CancelEdit()
                    throw $_
                }
            }
        }
    
        end {
            Write-Verbose "Invoke-ModuleScriptBody - End"
        }
    }
