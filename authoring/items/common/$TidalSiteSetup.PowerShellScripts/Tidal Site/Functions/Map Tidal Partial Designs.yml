Path: /sitecore/system/Modules/PowerShell/Script Library/JSS SXA/Tidal Site/Functions/Map Tidal Partial Designs
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    function Invoke-ModuleScriptBody {
        [CmdletBinding()]
        param(
            [Parameter(Mandatory = $true, Position = 0)]
            [Item]$Site,
    
            [Parameter(Mandatory = $true, Position = 1)]
            [Item[]]$TenantTemplates
        )
    
        begin {
            Write-Verbose "Invoke-ModuleScriptBody - Begin"
        }
    
        process {
            $sitePath = $Site.Paths.Path
            Write-Verbose "Target site: $sitePath"
    
            # Path to Page Designs
            $pageDesignsPath = "$sitePath/Presentation/Page Designs"
            $pageDesigns = Get-ChildItem -Path $pageDesignsPath -ErrorAction SilentlyContinue
    
            if (-not $pageDesigns) {
                Write-Warning "No Page Designs found at $pageDesignsPath"
                return
            }
    
            foreach ($pageDesign in $pageDesigns) {
                Write-Verbose "Processing Page Design: $($pageDesign.Name)"
    
                $fieldValue = $pageDesign.Fields["PartialDesigns"].Value
                if ([string]::IsNullOrWhiteSpace($fieldValue)) {
                    continue
                }
    
                $updatedIds = @()
                $ids = $fieldValue -split "\|"
    
                foreach ($id in $ids) {
                    $oldItem = Get-ItemByIdSafe $id
                    if (-not $oldItem) {
                        Write-Warning "Could not resolve item for ID $id"
                        continue
                    }
    
                    # Get relative path after "Tidal Partial Designs"
                    $relativePath = $null
                    if ($oldItem.Paths.Path -match "Tidal Partial Designs(.*)$") {
                        $relativePath = $Matches[1]
                    }
    
                    if (-not $relativePath) {
                        Write-Warning "Could not determine relative path for $($oldItem.Paths.Path)"
                        continue
                    }
    
                    # Build new site path
                    $newPath = "$sitePath/Presentation/Partial Designs$relativePath"
                    $newItem = Get-Item -Path $newPath -ErrorAction SilentlyContinue
    
                    if ($newItem) {
                        Write-Verbose "Mapping $($oldItem.Paths.Path) → $($newItem.Paths.Path)"
                        $updatedIds += $newItem.ID.ToString()
                    }
                    else {
                        Write-Warning "Could not find new item at $newPath"
                        # fallback to old ID to avoid breaking field completely
                        $updatedIds += $id
                    }
                }
    
                if ($updatedIds.Count -gt 0) {
                    $newValue = [string]::Join("|", $updatedIds)
                    Write-Verbose "Updating PartialDesigns field for $($pageDesign.Name)"
                    $pageDesign.Editing.BeginEdit()
                    $pageDesign.Fields["PartialDesigns"].Value = $newValue
                    $pageDesign.Editing.EndEdit()
                }
            }
        }
    
        end {
            Write-Verbose "Invoke-ModuleScriptBody - End"
        }
    }
