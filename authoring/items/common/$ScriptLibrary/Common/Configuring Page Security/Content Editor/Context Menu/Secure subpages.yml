Path: /sitecore/system/Modules/PowerShell/Script Library/Common/Configuring Page Security/Content Editor/Context Menu/Secure subpages
SharedFields:
- ID: "b1a94ff0-6897-47c0-9c51-aa6acb80b1f0"
  Hint: Script
  Value: |
    # Secure Subpages: sets the "pageRequiresAuth" field to true on the selected item and all its sub-items across all language versions.
    function Set-PageRequiresAuth {
        param(
            [Item]$currentItem
        )
    
        try {
            if ($null -eq $currentItem) {
                Write-Log -Log Error "Null item encountered. Skipping..."
                return
            }
    
            # Get all language versions of the current item that actually have content
            $languageVersions = $currentItem.Languages | ForEach-Object { 
                try {
                    Get-Item -Path $currentItem.Paths.FullPath -Language $_.Name 
                }
                catch {
                    Write-Log -Log Warning "Could not get item $($currentItem.Paths.FullPath) in language $($_.Name): $($_.Exception.Message)"
                    return $null
                }
            } | Where-Object { $null -ne $_ -and $_.Versions.Count -gt 0 }
            
            foreach ($languageItem in $languageVersions) {
                try {
                    # Check if the item has the pageRequiresAuth field
                    if ($languageItem.Fields["pageRequiresAuth"]) {
                        $languageItem.Editing.BeginEdit()
                        try {
                            $languageItem["pageRequiresAuth"] = "1"   # Checkbox checked = true
                            $languageItem.Editing.EndEdit()
                            Write-Log -Log Info "Updated $($languageItem.Paths.FullPath) in language: $($languageItem.Language.Name)"
                        }
                        catch {
                            $languageItem.Editing.CancelEdit()
                            Write-Log -Log Error "Failed to update $($languageItem.Paths.FullPath) in language $($languageItem.Language.Name): $($_.Exception.Message)"
                        }
                    }
                    else {
                        Write-Log -Log Info "Item $($languageItem.Paths.FullPath) in language $($languageItem.Language.Name) does not have pageRequiresAuth field"
                    }
                }
                catch {
                    Write-Log -Log Error "Error processing $($languageItem.Paths.FullPath) in language $($languageItem.Language.Name): $($_.Exception.Message)"
                }
            }
        }
        catch {
            Write-Log -Log Error "Unexpected error on $($currentItem.Paths.FullPath): $($_.Exception.Message)"
        }
    }
    
    # Main script execution
    try {
        Write-Log -Log Info "Starting pageRequiresAuth update script for all language versions..."
        
        # Get the current item (the item the script is run against)
        $parentItem = Get-Item .
        
        Write-Log -Log Info "Processing parent item: $($parentItem.Paths.FullPath)"
        
        # Update the parent item in all its language versions
        Set-PageRequiresAuth -currentItem $parentItem
        
        Write-Log -Log Info "Processing child items recursively..."
        
        # Get all child items recursively and update them in all their language versions
        Get-ChildItem -Path $parentItem.FullPath -Recurse | ForEach-Object { 
            Write-Log -Log Info "Processing item: $($_.Paths.FullPath)"
            Set-PageRequiresAuth -currentItem $_ 
        }
        
        Write-Log -Log Info "Successfully completed updating pageRequiresAuth for all items and their language versions."
    }
    catch {
        Write-Log -Log Error "Script execution failed: $($_.Exception.Message)"
        Write-Log -Log Error "Stack trace: $($_.ScriptStackTrace)"
    }
